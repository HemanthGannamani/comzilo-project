version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: comzilo_mysql
    restart: always
    environment:
      MYSQL_DATABASE: comzilo_db
      MYSQL_ROOT_PASSWORD: RootPasswordSecure2026!
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: comzilo_backend
    restart: always
    environment:
      - PORT=8080
      - NODE_ENV=production
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=RootPasswordSecure2026!
      - DB_NAME=comzilo_db
      - JWT_SECRET=PlatformSuperAdminSecureJwtSecretKey2026!
      - CORS_ALLOWED_ORIGINS=http://localhost:80,http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      - db

  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: comzilo_admin_panel
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:

name: Comzilo SaaS CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      - name: Run Linter
        run: |
          cd backend
          npm run lint

      - name: Compile Build
        run: |
          cd backend
          npm run build

  admin-panel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: admin-panel/package-lock.json

      - name: Install Dependencies
        run: |
          cd admin-panel
          npm ci

      - name: Run Linter
        run: |
          cd admin-panel
          npm run lint

      - name: Compile Build
        run: |
          cd admin-panel
          npm run build
